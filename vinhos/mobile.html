<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Carta de Vinhos – DaSelva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital,wght@0,400;0,700;1,400;1,700&family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #e4e3e0;
    --ink: #000000;
    --ink-mid: #878787;
    --ink-faint: #d2d1d1;
    --brand: #d18678;
    --font-sans: 'Instrument Sans', Helvetica, Arial, sans-serif;
    --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
    --font-display: 'Bodoni Moda', 'Georgia', serif;
  }

  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
    min-height: 100dvh;
    overflow-x: hidden;
  }

  /* —— SUPER HEADER ———————————————————————————— */
  .super-header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    max-height: 33.3vh;
    display: flex;
    flex-direction: column;
    padding: 0 20px;
    border-bottom: 1px solid var(--ink);
  }

  /* top row: logo + EN button */
  .header-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 0 0;
    flex-shrink: 0;
  }

  .brand-logo {
    height: 32px;
    width: auto;
    display: block;
  }

  .brand-logo path, .brand-logo polygon, .brand-logo .st0 {
    fill: var(--ink) !important;
  }

  .btn-lang {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: 3px 10px;
    border: 1px solid var(--ink-mid);
    background: transparent;
    color: var(--ink-mid);
    border-radius: 999px;
    cursor: pointer;
    transition: all .15s ease;
    flex-shrink: 0;
  }

  .btn-lang:active {
    background: var(--ink);
    color: var(--bg);
    border-color: var(--ink);
  }

  /* title */
  .mobile-title {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 20px;
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -.02em;
    line-height: 1.1;
    padding: 8px 0 6px;
    flex-shrink: 0;
  }

  /* search */
  .search-wrap {
    position: relative;
    flex-shrink: 0;
    padding-bottom: 8px;
  }

  .search-wrap svg {
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    opacity: .38;
    pointer-events: none;
  }

  input[type="search"] {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--ink);
    outline: none;
    padding: 4px 0 4px 22px;
    font-family: var(--font-sans);
    font-size: 13px;
    color: var(--ink);
    -webkit-appearance: none;
  }

  input[type="search"]::placeholder { color: var(--ink-mid); }
  input[type="search"]::-webkit-search-cancel-button { display: none; }

  /* filters horizontal scroll */
  .filters-scroll {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
    padding: 8px 0;
    flex-shrink: 0;
  }

  .filters-scroll::-webkit-scrollbar { display: none; }

  .filter-btn {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 4px 12px;
    border: 1px solid var(--ink-mid);
    background: transparent;
    color: var(--ink-mid);
    cursor: pointer;
    transition: all .15s ease;
    white-space: nowrap;
    border-radius: 999px;
    flex-shrink: 0;
  }

  .filter-btn:active {
    opacity: .7;
  }

  .filter-btn.active {
    background: var(--btn-color, var(--ink));
    color: var(--bg);
    border-color: var(--btn-color, var(--ink));
  }

  /* sort row */
  .sort-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 0 8px;
    flex-shrink: 0;
  }

  .sort-row .count-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-mid);
  }

  .sort-select {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 4px 24px 4px 10px;
    border: 1px solid var(--ink-mid);
    border-radius: 999px;
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
    outline: none;
    background-image: url("data:image/svg+xml,%3Csvg width='8' height='5' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23878787' stroke-width='1.2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 8px center;
  }

  /* —— ACCORDION CONTENT ————————————————————————— */
  .accordion {
    flex: 1;
    overflow-y: auto;
  }

  .cat-section {
    border-bottom: 1px solid var(--ink);
  }

  .cat-section:last-child {
    border-bottom: none;
  }

  .cat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .cat-header:active {
    background: rgba(0,0,0,.03);
  }

  .cat-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .cat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .cat-name {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -.02em;
    color: var(--ink);
  }

  .cat-count {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-mid);
    margin-left: 6px;
  }

  .cat-chevron {
    width: 12px;
    height: 12px;
    transition: transform .25s ease;
    flex-shrink: 0;
    color: var(--ink-mid);
  }

  .cat-section.open .cat-chevron {
    transform: rotate(180deg);
  }

  .cat-items {
    max-height: 0;
    overflow: hidden;
    transition: max-height .35s ease;
  }

  .cat-section.open .cat-items {
    max-height: 9999px;
  }

  /* —— WINE ITEM (mobile card) ———————————————— */
  .wine-item {
    padding: 16px 20px 20px;
    border-top: 1px solid var(--ink);
  }

  .item-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 4px;
  }

  .item-name {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -.02em;
    line-height: 1.2;
    color: var(--ink);
    flex: 1;
  }

  .item-price {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -.02em;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .item-origin {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-mid);
    margin-bottom: 10px;
  }

  .item-desc {
    font-size: 12px;
    line-height: 1.6;
    color: rgba(0,0,0,.65);
    margin-bottom: 10px;
  }

  .item-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 12px;
  }

  .tag {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: .04em;
    padding: 2px 8px;
    border: 1px solid var(--ink);
    color: var(--ink);
    text-transform: lowercase;
    border-radius: 999px;
  }

  .item-bars {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .bar-label {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--ink);
    width: 42px;
    flex-shrink: 0;
  }

  .bar-track {
    flex: 1;
    height: 3px;
    background: var(--ink-faint);
  }

  .bar-fill {
    height: 100%;
    transition: width .6s ease;
  }

  /* —— FOOTER ———————————————————————————————————— */
  .mobile-footer {
    padding: 16px 20px;
    border-top: 1px solid var(--ink);
    text-align: center;
  }

  .mobile-footer p {
    font-family: var(--font-mono);
    font-size: 9px;
    color: var(--ink-mid);
    letter-spacing: .08em;
    text-transform: uppercase;
    line-height: 1.8;
  }

  /* —— EMPTY STATE ——————————————————————————————— */
  .empty-state {
    padding: 48px 20px;
    text-align: center;
  }

  .empty-state p {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-mid);
    letter-spacing: .08em;
    text-transform: uppercase;
  }
</style>
</head>

const categories = [
  { tipo: 'espumante', label: 'Espumantes', labelEn: 'Sparkling Wines', color: '#4a7fb5' },
  { tipo: 'branco', label: 'Brancos', labelEn: 'White Wines', color: '#c8920a' },
  { tipo: 'rose', label: 'Rosé', labelEn: 'Rosé', color: '#b5537e' },
  { tipo: 'tinto', label: 'Tintos', labelEn: 'Red Wines', color: '#6b1414' },
];

const accordion = document.getElementById('accordion');
const searchInput = document.getElementById('search');
const filterBtns = document.querySelectorAll('.filter-btn');
const sortSelect = document.getElementById('sort');
const countLabel = document.getElementById('count-label');
const btnLang = document.getElementById('btn-lang');
const mobileTitle = document.getElementById('mobile-title');

let activeFilter = 'all';
let searchTerm = '';
let activeSort = 'default';
let lang = 'pt';
let openSections = new Set();

function parsePrice(p) {
  return parseInt(p.replace(/[^\d]/g, ''), 10);
}

function normalize(str) {
  return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function matches(w) {
  const filterOk = activeFilter === 'all' || w.tipo === activeFilter;
  if (!filterOk) return false;
  if (!searchTerm) return true;
  const q = normalize(searchTerm);
  const haystack = normalize([w.name, w.origin, w.originEn || '', w.catLabel, ...w.tags, ...(w.tagsEn || []), w.desc, w.descEn || ''].join(' '));
  return haystack.includes(q);
}

function sortWines(list) {
  const arr = [...list];
  switch (activeSort) {
    case 'az': arr.sort((a, b) => a.name.localeCompare(b.name, 'pt')); break;
    case 'za': arr.sort((a, b) => b.name.localeCompare(a.name, 'pt')); break;
    case 'preco-asc': arr.sort((a, b) => parsePrice(a.price) - parsePrice(b.price)); break;
    case 'preco-desc': arr.sort((a, b) => parsePrice(b.price) - parsePrice(a.price)); break;
  }
  return arr;
}

function renderBars(bars, color) {
  return bars.map(([label, val]) => `
    <div class="bar-row">
      <span class="bar-label">${label}</span>
      <div class="bar-track">
        <div class="bar-fill" style="width:${val * 20}%; background:${color}"></div>
      </div>
    </div>`).join('');
}

function renderItem(w) {
  const isEn = lang === 'en';
  const origin = isEn ? (w.originEn || w.origin) : w.origin;
  const desc = isEn ? (w.descEn || w.desc) : w.desc;
  const tags = isEn ? (w.tagsEn || w.tags) : w.tags;
  const bars = isEn ? (w.barsEn || w.bars) : w.bars;

  return `
    <div class="wine-item">
      <div class="item-top">
        <h3 class="item-name">${w.name}</h3>
        <span class="item-price">${w.price}</span>
      </div>
      <div class="item-origin">${origin}</div>
      <p class="item-desc">${desc}</p>
      <div class="item-tags">${tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      <div class="item-bars">${renderBars(bars, w.stripeColor)}</div>
    </div>`;
}

function render() {
  const visible = sortWines(wines.filter(matches));
  const isEn = lang === 'en';
  countLabel.textContent = `${visible.length} ${isEn ? 'wine' : 'rótulo'}${visible.length !== 1 ? 's' : ''}`;

  if (visible.length === 0) {
    accordion.innerHTML = `<div class="empty-state"><p>${isEn ? 'No wines found' : 'Nenhum vinho encontrado'}</p></div>`;
    return;
  }

  const catsToShow = activeFilter === 'all'
    ? categories
    : categories.filter(c => c.tipo === activeFilter);

  let html = '';

  catsToShow.forEach(cat => {
    const catWines = visible.filter(w => w.tipo === cat.tipo);
    if (catWines.length === 0) return;

    const isOpen = openSections.has(cat.tipo);
    const catName = isEn ? cat.labelEn : cat.label;

    html += `
      <div class="cat-section${isOpen ? ' open' : ''}" data-tipo="${cat.tipo}">
        <div class="cat-header" data-tipo="${cat.tipo}">
          <div class="cat-header-left">
            <span class="cat-dot" style="background:${cat.color}"></span>
            <span class="cat-name">${catName}</span>
            <span class="cat-count">${catWines.length}</span>
          </div>
          <svg class="cat-chevron" viewBox="0 0 12 12" fill="none">
            <path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="cat-items">
          ${catWines.map(renderItem).join('')}
        </div>
      </div>`;
  });

  accordion.innerHTML = html;

  document.querySelectorAll('.cat-header').forEach(hdr => {
    hdr.addEventListener('click', () => {
      const tipo = hdr.dataset.tipo;
      const section = hdr.closest('.cat-section');
      if (openSections.has(tipo)) {
        openSections.delete(tipo);
        section.classList.remove('open');
      } else {
        openSections.add(tipo);
        section.classList.add('open');
      }
    });
  });
}

searchInput.addEventListener('input', e => {
  searchTerm = e.target.value.trim();
  if (searchTerm) {
    openSections = new Set(categories.map(c => c.tipo));
  }
  render();
});

filterBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    filterBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    if (activeFilter !== 'all') {
      openSections.add(activeFilter);
    }
    render();
  });
});

sortSelect.addEventListener('change', e => {
  activeSort = e.target.value;
  render();
});

btnLang.addEventListener('click', () => {
  lang = lang === 'pt' ? 'en' : 'pt';
  btnLang.textContent = lang === 'pt' ? 'EN' : 'PT';
  mobileTitle.textContent = lang === 'pt' ? 'Carta de Vinhos DaSelva.' : 'Wine List DaSelva.';
  searchInput.placeholder = lang === 'pt' ? 'Buscar vinho, uva, origem...' : 'Search wine, grape, origin...';
  render();
});

render();
</script>
