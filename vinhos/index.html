<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Carta de Vinhos – DaSelva</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/aeonik" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/lipis/flag-icons@7.0.0/css/flag-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #e4e3e0;
    --ink: #000000;
    --ink-mid: #878787;
    --ink-faint: #d2d1d1;
    --brand: #d18678;
    --brand-border: #000000;
    --font-sans: 'Instrument Sans', Helvetica, Arial, sans-serif;
    --font-mono: 'IBM Plex Mono', 'Courier New', monospace;
    --font-display: 'Aeonik', 'Helvetica Neue', Helvetica, Arial, sans-serif;
  }

  html { scroll-behavior: smooth; -webkit-text-size-adjust: 100%; }

  body {
    background: var(--bg);
    color: var(--ink);
    font-family: var(--font-sans);
    font-size: 15px;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ====================================================
     DESKTOP LAYOUT
     ==================================================== */

  /* —— HERO HEADER (pattern background) ——————————— */
  .hero-header {
    position: relative;
    background-image: url('pattern.png');
    background-size: cover;
    background-position: center;
    overflow: hidden;
  }

  /* —— HEADER ——————————————————————————————————————— */
  header {
    padding: 0 40px;
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 0 14px;
  }

  .header-brand {
    display: flex;
    align-items: center;
  }

  .brand-logo {
    height: 63px;
    width: 191px;
    object-fit: contain;
    display: block;
  }

  .brand-logo path, .brand-logo polygon, .brand-logo .st0 {
    fill: var(--ink) !important;
  }

  .btn-lang {
    font-family: var(--font-mono);
    font-size: 9px;
    letter-spacing: .1em;
    text-transform: uppercase;
    padding: 3px 10px;
    border: 1px solid var(--ink-mid);
    background: transparent;
    color: var(--ink-mid);
    border-radius: 999px;
    cursor: pointer;
    transition: all .15s ease;
    flex-shrink: 0;
    margin-left: 12px;
  }

  .btn-lang:hover {
    border-color: var(--ink);
    color: var(--ink);
  }

  /* —— SEARCH + FILTERS ——————————————————————————— */
  .header-controls {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 0;
    padding: 12px 0;
    border-top: 1px solid #000000;
  }

  .search-wrap {
    flex: 1;
    position: relative;
    max-width: 677px;
  }

  .search-wrap svg {
    position: absolute;
    left: 0;
    top: 50%;
    transform: translateY(-50%);
    opacity: .38;
    pointer-events: none;
  }

  input[type="search"] {
    width: 100%;
    background: transparent;
    border: none;
    border-bottom: 1px solid var(--ink);
    outline: none;
    padding: 6px 0 6px 24px;
    font-family: var(--font-sans);
    font-size: 14px;
    color: var(--ink);
    -webkit-appearance: none;
  }

  input[type="search"]::placeholder { color: var(--ink-mid); }
  input[type="search"]::-webkit-search-cancel-button { display: none; }

  .filters {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-left: 40px;
    flex-wrap: wrap;
  }

  .filter-btn {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .08em;
    text-transform: uppercase;
    padding: 5px 14px;
    border: 1px solid var(--ink-mid);
    background: transparent;
    color: var(--ink-mid);
    cursor: pointer;
    transition: all .15s ease;
    white-space: nowrap;
    border-radius: 999px;
  }

  .filter-btn:hover {
    border-color: var(--btn-color, var(--ink));
    color: var(--btn-color, var(--ink));
  }

  .filter-btn.active {
    background: var(--btn-color, var(--ink));
    color: var(--bg);
    border-color: var(--btn-color, var(--ink));
  }

  /* —— SORT DROPDOWN ———————————————————————————— */
  .sort-wrap {
    position: relative;
    margin-left: 16px;
    flex-shrink: 0;
  }

  .sort-select {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .06em;
    text-transform: uppercase;
    padding: 5px 28px 5px 12px;
    border: 1px solid var(--ink-mid);
    border-radius: 999px;
    background: transparent;
    color: var(--ink);
    cursor: pointer;
    -webkit-appearance: none;
    -moz-appearance: none;
    appearance: none;
    outline: none;
    transition: border-color .15s ease;
    background-image: url("data:image/svg+xml,%3Csvg width='10' height='6' viewBox='0 0 10 6' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1l4 4 4-4' stroke='%23878787' stroke-width='1.2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E");
    background-repeat: no-repeat;
    background-position: right 10px center;
  }

  .sort-select:hover,
  .sort-select:focus {
    border-color: var(--ink);
  }

  /* —— HERO / TITLE ——————————————————————————————— */
  .page-title {
    padding: 48px 40px 24px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 40px;
  }

  .page-title h1 {
    font-family: var(--font-display);
    font-size: clamp(42px, 5.5vw, 64px);
    font-weight: 700;
    color: var(--ink);
    letter-spacing: -.03em;
    line-height: 1.0;
    padding-bottom: 0;
    max-width: 744px;
  }

  .page-title-meta {
    padding-bottom: 4px;
    text-align: right;
    flex-shrink: 0;
  }

  .page-label {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .12em;
    text-transform: uppercase;
    color: var(--ink-mid);
    display: block;
    margin-bottom: 4px;
  }

  /* —— HERO-GRID DIVIDER ————————————————————————— */
  .hero-divider {
    height: 1px;
    background: #000000;
  }

  /* —— GRID ——————————————————————————————————————— */
  .wine-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
  }

  .wine-card {
    border-right: 1px solid var(--brand-border);
    border-bottom: 1px solid var(--brand-border);
    padding: 28px 32px 32px;
    display: flex;
    flex-direction: column;
    gap: 0;
    transition: background .15s ease;
    animation: fadeUp .4s ease both;
  }

  .wine-card:nth-child(3n) { border-right: none; }

  .wine-card:hover { background: rgba(0,0,0,.03); }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .card-index {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-mid);
    margin-bottom: 14px;
    letter-spacing: .06em;
  }

  .card-cat {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .1em;
    text-transform: uppercase;
    color: var(--ink-mid);
    margin-bottom: 10px;
  }

  .card-name {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: -.025em;
    line-height: 1.15;
    margin-bottom: 4px;
    color: var(--ink);
  }

  .card-origin {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink);
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-origin .fi, .item-origin .fi {
    font-size: 12px;
    border-radius: 2px;
    flex-shrink: 0;
  }

  .card-divider {
    height: 1px;
    background: #000000;
    margin-bottom: 16px;
  }

  .card-desc {
    font-size: 13px;
    line-height: 1.65;
    color: rgba(0,0,0,.72);
    margin-bottom: 18px;
    flex: 1;
  }

  .card-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 18px;
  }

  .tag {
    font-family: var(--font-mono);
    font-size: 10px;
    letter-spacing: .04em;
    padding: 3px 10px;
    border: 1px solid var(--ink);
    color: var(--ink);
    text-transform: lowercase;
    border-radius: 999px;
  }

  .card-bars {
    display: flex;
    flex-direction: column;
    gap: 7px;
    margin-bottom: 20px;
  }

  .bar-row {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .bar-label {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink);
    width: 48px;
    flex-shrink: 0;
  }

  .bar-track {
    flex: 1;
    height: 4px;
    background: var(--ink-faint);
  }

  .bar-fill {
    height: 100%;
    background: var(--ink);
    transition: width .6s ease;
  }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 14px;
    border-top: 1px solid #000000;
  }

  .card-price {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -.02em;
  }

  /* —— EMPTY STATE —————————————————————————————— */
  .empty-state {
    grid-column: 1 / -1;
    padding: 80px 40px;
    text-align: center;
  }

  .empty-state p {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--ink-mid);
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  /* —— FOOTER ——————————————————————————————————— */
  footer {
    padding: 24px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-top: 1px solid #000000;
  }

  footer p {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-mid);
    letter-spacing: .08em;
    text-transform: uppercase;
  }

  /* ====================================================
     MOBILE LAYOUT — hidden by default
     ==================================================== */
  .mobile-header { display: none; }
  .mobile-accordion { display: none; }

  /* ====================================================
     MOBILE ACCORDION STYLES (always defined, shown via MQ)
     ==================================================== */
  .cat-section {
    border-bottom: 1px solid var(--ink);
  }

  .cat-section:last-child {
    border-bottom: none;
  }

  .cat-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 20px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
    user-select: none;
  }

  .cat-header:active {
    background: rgba(0,0,0,.03);
  }

  .cat-header-left {
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .cat-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .cat-name {
    font-family: var(--font-sans);
    font-size: 16px;
    font-weight: 400;
    letter-spacing: .05em;
    text-transform: uppercase;
    color: var(--ink);
  }

  .cat-count {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-mid);
    margin-left: 6px;
  }

  .cat-chevron {
    width: 12px;
    height: 12px;
    transition: transform .25s ease;
    flex-shrink: 0;
    color: var(--ink-mid);
  }

  .cat-section.open .cat-chevron {
    transform: rotate(180deg);
  }

  .cat-items {
    max-height: 0;
    overflow: hidden;
    transition: max-height .35s ease;
  }

  .cat-section.open .cat-items {
    max-height: 9999px;
  }

  .wine-item {
    padding: 16px 20px 20px;
    border-top: 1px solid var(--ink);
  }

  .item-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 4px;
  }

  .item-name {
    font-size: 17px;
    font-weight: 700;
    letter-spacing: -.02em;
    line-height: 1.2;
    color: var(--ink);
    flex: 1;
  }

  .item-price {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -.02em;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .item-origin {
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-mid);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .item-desc {
    font-size: 12px;
    line-height: 1.6;
    color: rgba(0,0,0,.65);
    margin-bottom: 10px;
  }

  .item-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    margin-bottom: 12px;
  }

  .item-bars {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  /* —— RESPONSIVE: tablet ————————————————————————— */
  @media (max-width: 1024px) {
    .wine-grid { grid-template-columns: repeat(2, 1fr); }
    .wine-card:nth-child(3n) { border-right: 1px solid #000000; }
    .wine-card:nth-child(2n) { border-right: none; }
  }

  /* —— RESPONSIVE: mobile ————————————————————————— */
  @media (max-width: 680px) {
    /* hide desktop layout */
    .hero-header { display: none; }
    .hero-divider { display: none; }
    main { display: none; }
    footer { display: none; }

    /* show mobile layout */
    .mobile-header {
      display: flex;
      flex-direction: column;
      gap: 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      background: var(--bg);
      padding: 0 20px 12px;
      border-bottom: 1px solid var(--ink);
    }

    .mobile-header .m-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0 0;
      flex-shrink: 0;
    }

    .mobile-header .brand-logo {
      height: 32px;
      width: 95px;
      object-fit: contain;
    }

    .mobile-header .m-title {
      font-family: var(--font-display);
      font-size: 40px;
      font-weight: 400;
      color: var(--ink);
      letter-spacing: -.03em;
      line-height: 1.05;
      height: 100px;
      display: flex;
      align-items: flex-end;
      flex-shrink: 0;
    }

    .mobile-header .search-wrap {
      max-width: none;
      padding-bottom: 8px;
      flex-shrink: 0;
    }

    .mobile-header input[type="search"] {
      padding: 4px 0 4px 22px;
      font-size: 13px;
    }

    .mobile-header .m-filters {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
      padding: 0;
      flex-shrink: 0;
      margin-left: 0;
      flex-wrap: nowrap;
    }

    .mobile-header .m-filters::-webkit-scrollbar { display: none; }

    .mobile-header .m-filters .filter-btn {
      font-size: 11px;
      padding: 5px 15px;
      flex-shrink: 0;
    }

    .mobile-header .m-sort-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0;
      flex-shrink: 0;
    }

    .mobile-header .m-count {
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--ink-mid);
    }

    .mobile-header .sort-select {
      font-size: 9px;
      padding: 4px 24px 4px 10px;
    }

    .mobile-accordion {
      display: block;
    }

    .cat-section.open .cat-header {
      background: var(--bg);
      transition: background .25s ease;
    }

    .mobile-footer {
      padding: 16px 20px;
      border-top: 1px solid var(--ink);
      text-align: center;
    }

    .mobile-footer p {
      font-family: var(--font-mono);
      font-size: 9px;
      color: var(--ink-mid);
      letter-spacing: .08em;
      text-transform: uppercase;
      line-height: 1.8;
    }

    .item-tags .tag {
      font-size: 9px;
      padding: 2px 8px;
    }

    .item-bars .bar-label {
      font-size: 9px;
      width: 42px;
    }

    .item-bars .bar-track {
      height: 3px;
    }
  }
</style>
</head>

      </svg>
    </div>
    <button class="btn-lang" id="btn-lang">EN</button>
  </div>
  <div class="header-controls">

const categories = [
  { tipo: 'espumante', label: 'Espumantes', labelEn: 'Sparkling Wines', color: '#a29183' },
  { tipo: 'branco', label: 'Brancos', labelEn: 'White Wines', color: '#c8920a' },
  { tipo: 'rose', label: 'Rosés', labelEn: 'Rosé Wines', color: '#b5537e' },
  { tipo: 'tinto', label: 'Tintos', labelEn: 'Red Wines', color: '#6b1414' },
];

const MOBILE_BP = 680;

/* DOM refs — desktop */
const grid = document.getElementById('grid');
const searchInput = document.getElementById('search');
const filterBtns = document.querySelectorAll('#filters .filter-btn');
const sortSelect = document.getElementById('sort');
const countLabel = document.getElementById('count-label');
const btnLang = document.getElementById('btn-lang');
const desktopTitle = document.getElementById('desktop-title');

/* DOM refs — mobile */
const accordion = document.getElementById('accordion');
const searchInputM = document.getElementById('search-m');
const filterBtnsM = document.querySelectorAll('#filters-m .filter-btn');
const sortSelectM = document.getElementById('sort-m');
const countLabelM = document.getElementById('count-label-m');
const btnLangM = document.getElementById('btn-lang-m');
const mobileTitle = document.getElementById('mobile-title');

let activeFilter = 'all';
let searchTerm = '';
let activeSort = 'default';
let lang = 'pt';
let openSections = new Set(['espumante', 'branco', 'rose', 'tinto']);

const catOrder = { 'espumante': 0, 'branco': 1, 'rose': 2, 'tinto': 3 };

function isMobile() { return window.innerWidth <= MOBILE_BP; }

function parsePrice(p) { return parseInt(p.replace(/[^\d]/g, ''), 10); }

function normalize(str) {
  return str.toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
}

function matches(w) {
  const filterOk = activeFilter === 'all' || w.tipo === activeFilter;
  if (!filterOk) return false;
  if (!searchTerm) return true;
  const q = normalize(searchTerm);
  const fields = [w.name, t(w,'origin'), t(w,'catLabel'), ...t(w,'tags'), t(w,'desc')];
  const haystack = normalize(fields.join(' '));
  return haystack.includes(q);
}

/* ——— i18n helpers ——— */
function t(w, field) {
  if (lang === 'en' && w[field + 'En']) return w[field + 'En'];
  return w[field];
}

function renderBars(w, color) {
  const bars = lang === 'en' && w.barsEn ? w.barsEn : w.bars;
  return bars.map(([label, val]) => `
    <div class="bar-row">
      <span class="bar-label">${label}</span>
      <div class="bar-track">
        <div class="bar-fill" style="width:${val * 20}%; background:${color}"></div>
      </div>
    </div>`).join('');
}

function sortWines(list) {
  const arr = [...list];
  switch (activeSort) {
    case 'categoria':
      arr.sort((a, b) => (catOrder[a.tipo] ?? 99) - (catOrder[b.tipo] ?? 99));
      break;
    case 'az':
      arr.sort((a, b) => a.name.localeCompare(b.name, 'pt'));
      break;
    case 'za':
      arr.sort((a, b) => b.name.localeCompare(a.name, 'pt'));
      break;
    case 'preco-asc':
      arr.sort((a, b) => parsePrice(a.price) - parsePrice(b.price));
      break;
    case 'preco-desc':
      arr.sort((a, b) => parsePrice(b.price) - parsePrice(a.price));
      break;
  }
  return arr;
}

function updateCount(visible) {
  const txt = lang === 'en'
    ? `${visible.length} label${visible.length !== 1 ? 's' : ''}`
    : `${visible.length} rótulo${visible.length !== 1 ? 's' : ''}`;
  countLabel.textContent = txt;
  countLabelM.textContent = txt;
}

/* ——— DESKTOP RENDER ——— */
function renderDesktop() {
  const visible = sortWines(wines.filter(matches));
  updateCount(visible);

  const emptyMsg = lang === 'en' ? 'No wines found' : 'Nenhum vinho encontrado';
  if (visible.length === 0) {
    grid.innerHTML = `<div class="empty-state"><p>${emptyMsg}</p></div>`;
    return;
  }

  grid.innerHTML = visible.map((w, i) => `
    <div class="wine-card" style="animation-delay:${i * 30}ms" data-tipo="${w.tipo}">
      <div class="card-index">${String(i + 1).padStart(2, '0')}</div>
      <div class="card-cat" style="color:${w.stripeColor}">${t(w,'catLabel')}</div>
      <h2 class="card-name">${w.name}</h2>
      <div class="card-origin"><span class="fi fi-${w.flag}"></span>${t(w,'origin')}</div>
      <div class="card-divider"></div>
      <p class="card-desc">${t(w,'desc')}</p>
      <div class="card-tags">${t(w,'tags').map(tag => `<span class="tag">${tag}</span>`).join('')}</div>
      <div class="card-bars">${renderBars(w, w.stripeColor)}</div>
      <div class="card-footer">
        <span class="card-price">${w.price}</span>
      </div>
    </div>`).join('');

  const cards = grid.querySelectorAll('.wine-card');
  const cols = window.innerWidth > 1024 ? 3 : 2;
  cards.forEach((c, i) => {
    c.style.borderRight = (i + 1) % cols === 0 ? 'none' : '1px solid #000000';
  });
}

/* ——— MOBILE RENDER (accordion) ——— */
function renderMobile() {
  const visible = sortWines(wines.filter(matches));
  updateCount(visible);

  const emptyMsg = lang === 'en' ? 'No wines found' : 'Nenhum vinho encontrado';
  if (visible.length === 0) {
    accordion.innerHTML = `<div class="empty-state"><p>${emptyMsg}</p></div>`;
    return;
  }

  const catsToShow = activeFilter === 'all'
    ? categories
    : categories.filter(c => c.tipo === activeFilter);

  let html = '';
  catsToShow.forEach(cat => {
    const catWines = visible.filter(w => w.tipo === cat.tipo);
    if (catWines.length === 0) return;
    const isOpen = openSections.has(cat.tipo);
    const catName = lang === 'en' ? cat.labelEn : cat.label;

    html += `
      <div class="cat-section${isOpen ? ' open' : ''}" data-tipo="${cat.tipo}" style="--cat-color:${cat.color}">
        <div class="cat-header" data-tipo="${cat.tipo}">
          <div class="cat-header-left">
            <span class="cat-dot" style="background:${cat.color}"></span>
            <span class="cat-name">${catName}</span>
            <span class="cat-count">${catWines.length}</span>
          </div>
          <svg class="cat-chevron" viewBox="0 0 12 12" fill="none">
            <path d="M3 4.5l3 3 3-3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <div class="cat-items">
          ${catWines.map(w => `
            <div class="wine-item">
              <div class="item-top">
                <h3 class="item-name">${w.name}</h3>
                <span class="item-price">${w.price}</span>
              </div>
              <div class="item-origin"><span class="fi fi-${w.flag}"></span>${t(w,'origin')}</div>
              <p class="item-desc">${t(w,'desc')}</p>
              <div class="item-tags">${t(w,'tags').map(tag => `<span class="tag">${tag}</span>`).join('')}</div>
              <div class="item-bars">${renderBars(w, w.stripeColor)}</div>
            </div>`).join('')}
        </div>
      </div>`;
  });

  accordion.innerHTML = html;

  document.querySelectorAll('.cat-header').forEach(hdr => {
    hdr.addEventListener('click', () => {
      const tipo = hdr.dataset.tipo;
      const section = hdr.closest('.cat-section');
      if (openSections.has(tipo)) {
        openSections.delete(tipo);
        section.classList.remove('open');
      } else {
        openSections.add(tipo);
        section.classList.add('open');
      }
    });
  });
}

/* ——— UNIFIED RENDER ——— */
function render() {
  if (isMobile()) {
    renderMobile();
  } else {
    renderDesktop();
  }
}

/* ——— SYNC STATE between desktop & mobile controls ——— */
function syncSearch(val) {
  searchTerm = val.trim();
  searchInput.value = val;
  searchInputM.value = val;
  if (isMobile() && searchTerm) {
    openSections = new Set(categories.map(c => c.tipo));
  }
  render();
}

function syncFilter(filter, sourceButtons) {
  activeFilter = filter;
  // sync both sets of buttons
  [filterBtns, filterBtnsM].forEach(btns => {
    btns.forEach(b => {
      b.classList.toggle('active', b.dataset.filter === filter);
    });
  });
  if (isMobile() && filter !== 'all') {
    openSections.add(filter);
  }
  render();
}

function syncSort(val) {
  activeSort = val;
  sortSelect.value = val;
  sortSelectM.value = val;
  render();
}

const ui = {
  pt: {
    title: 'Carta de Vinhos DaSelva.',
    titleHtml: 'Carta de Vinhos<br>DaSelva.',
    search: 'Buscar vinho, uva, origem...',
    filterAll: 'Todos',
    filterEsp: 'Espumante',
    filterBr: 'Branco',
    filterRo: 'Rosé',
    filterTi: 'Tinto',
    sortDefault: 'Ordenar: Padrão',
    sortCat: 'Ordenar: Categoria',
    sortAZ: 'Ordenar: A–Z',
    sortZA: 'Ordenar: Z–A',
    sortPriceAsc: 'Ordenar: Menor preço',
    sortPriceDesc: 'Ordenar: Maior preço',
    sortDefaultM: 'Padrão',
    sortAZM: 'A–Z',
    sortZAM: 'Z–A',
    sortPriceAscM: 'Menor preço',
    sortPriceDescM: 'Maior preço',
    footerLeft: 'DaSelva · Carta de Vinhos 2026',
    footerRight: 'Preços sujeitos a alteração',
  },
  en: {
    title: 'Wine List DaSelva.',
    titleHtml: 'Wine List<br>DaSelva.',
    search: 'Search wine, grape, origin...',
    filterAll: 'All',
    filterEsp: 'Sparkling',
    filterBr: 'White',
    filterRo: 'Rosé',
    filterTi: 'Red',
    sortDefault: 'Sort: Default',
    sortCat: 'Sort: Category',
    sortAZ: 'Sort: A–Z',
    sortZA: 'Sort: Z–A',
    sortPriceAsc: 'Sort: Lowest price',
    sortPriceDesc: 'Sort: Highest price',
    sortDefaultM: 'Default',
    sortAZM: 'A–Z',
    sortZAM: 'Z–A',
    sortPriceAscM: 'Lowest price',
    sortPriceDescM: 'Highest price',
    footerLeft: 'DaSelva · Wine List 2026',
    footerRight: 'Prices subject to change',
  }
};

const filterMap = { all: 'filterAll', espumante: 'filterEsp', branco: 'filterBr', rose: 'filterRo', tinto: 'filterTi' };

function updateUILang() {
  const s = ui[lang];
  // titles
  mobileTitle.textContent = s.title;
  desktopTitle.innerHTML = s.titleHtml;
  // search
  searchInput.placeholder = s.search;
  searchInputM.placeholder = s.search;
  // lang buttons
  btnLang.textContent = lang === 'pt' ? 'EN' : 'PT';
  btnLangM.textContent = lang === 'pt' ? 'EN' : 'PT';
  // filter buttons (both desktop & mobile)
  [filterBtns, filterBtnsM].forEach(btns => {
    btns.forEach(b => {
      const key = filterMap[b.dataset.filter];
      if (key) b.textContent = s[key];
    });
  });
  // sort options — desktop
  const sortOpts = sortSelect.options;
  sortOpts[0].textContent = s.sortDefault;
  if (sortOpts[1]) sortOpts[1].textContent = s.sortCat;
  if (sortOpts[2]) sortOpts[2].textContent = s.sortAZ;
  if (sortOpts[3]) sortOpts[3].textContent = s.sortZA;
  if (sortOpts[4]) sortOpts[4].textContent = s.sortPriceAsc;
  if (sortOpts[5]) sortOpts[5].textContent = s.sortPriceDesc;
  // sort options — mobile
  const sortOptsM = sortSelectM.options;
  sortOptsM[0].textContent = s.sortDefaultM;
  if (sortOptsM[1]) sortOptsM[1].textContent = s.sortAZM;
  if (sortOptsM[2]) sortOptsM[2].textContent = s.sortZAM;
  if (sortOptsM[3]) sortOptsM[3].textContent = s.sortPriceAscM;
  if (sortOptsM[4]) sortOptsM[4].textContent = s.sortPriceDescM;
  // footers
  document.querySelectorAll('footer p, .mobile-footer p').forEach((p, i) => {
    p.textContent = i % 2 === 0 ? s.footerLeft : s.footerRight;
  });
}

function syncLang() {
  lang = lang === 'pt' ? 'en' : 'pt';
  updateUILang();
  render();
}

/* events — desktop */
searchInput.addEventListener('input', e => syncSearch(e.target.value));
filterBtns.forEach(btn => btn.addEventListener('click', () => syncFilter(btn.dataset.filter)));
sortSelect.addEventListener('change', e => syncSort(e.target.value));
btnLang.addEventListener('click', syncLang);

/* events — mobile */
searchInputM.addEventListener('input', e => syncSearch(e.target.value));
filterBtnsM.forEach(btn => btn.addEventListener('click', () => syncFilter(btn.dataset.filter)));
sortSelectM.addEventListener('change', e => syncSort(e.target.value));
btnLangM.addEventListener('click', syncLang);

/* resize: re-render to switch layout */
let lastMobile = isMobile();
window.addEventListener('resize', () => {
  const nowMobile = isMobile();
  if (nowMobile !== lastMobile || !nowMobile) {
    lastMobile = nowMobile;
    render();
  }
});

render();
</script>
